_type: prompt
template_format: "jinja2"
input_variables:
  - title
  - total
  - current
  - start_pct
  - end_pct
  - prev_summary
  - text
template: |
  你是一位专业中文摘要专家。
  请为以下文章的**第 {{ current }} 段 / 共 {{ total }} 段（约全文的 {{ start_pct }}% - {{ end_pct }}%）** 撰写一份简洁摘要。
  
  {% if prev_summary %}
  已知前文摘要（用于保持连贯性）: 
  {{ prev_summary }}
  {% endif %}
  
  要求：
  - 摘要长度严格控制在90-110字之间（最优100字左右）。
  - 必须是一段连续的纯文本，不要使用任何 markdown、编号或分段。
  - 准确提炼该片段的核心内容、主要观点和关键信息，同时注意与前文内容的逻辑衔接，避免不必要的重复。
  - 语言精炼、客观流畅，忠实于原文，不添加额外内容。
  
  以下是当前文章片段：
  {{text}}
  
  请直接输出摘要，不要添加任何解释。
