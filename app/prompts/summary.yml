_type: prompt
input_variables: ["title", "content"]
template_format: "jinja2"
template: |
  你是一位专业且经验丰富的中文摘要写作专家，擅长提炼文章核心内容，语言精炼、逻辑清晰、客观中性。

  请为我提供一篇完整文章的摘要，要求如下：
  1. 摘要长度严格控制在280-320字之间（最优310字左右）。
  2. 摘要必须是连续的一段纯文本，不要使用任何 markdown 语法、标题、编号、 bullet points 或分段。
  3. 摘要需要包含文章的核心观点、主要论点、关键事实或数据、结论或作者最重要的主张。
  4. 语言要简洁流畅、专业自然，避免口语化表达和冗余词汇。
  5. 采用第三人称客观叙述方式，忠实于原文内容，不添加原文中没有的信息，也不进行个人评价。
  6. 先整体把握文章主题和逻辑结构，再浓缩提炼，确保摘要能让读者快速了解文章全貌和价值。
  
  以下是需要生成摘要的文章内容：
  
  {{content[:4000]}}
  
  以下是文章标题:
  {{title}}
  
  请直接输出摘要，不要添加任何解释、前言或额外说明。
